<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Thank You &mdash; PhoenixDrop</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f9fafb;color:#111827;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:24px}
.ty-card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;
  padding:48px 40px;max-width:520px;width:100%;
  box-shadow:0 2px 8px rgba(124,58,237,.08)}
.ty-icon{font-size:56px;margin-bottom:16px}
.ty-title{font-family:'Instrument Sans',sans-serif;font-size:28px;
  font-weight:700;margin-bottom:8px}
.ty-sub{font-size:15px;color:#6b7280;margin-bottom:24px;line-height:1.6}
.ty-order{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;
  padding:16px;margin-bottom:24px;font-size:13px;color:#6b7280}
.ty-order strong{color:#111827}
.ty-btn{display:inline-block;padding:12px 32px;background:#7c3aed;
  color:#fff;border-radius:10px;font-size:15px;font-weight:600;
  text-decoration:none;transition:background .2s}
.ty-btn:hover{background:#6d28d9;text-decoration:none}
.ty-footer{margin-top:32px;font-size:12px;color:#9ca3af}
</style>
</head>
<body>
<div class="ty-card">
  <div class="ty-icon">&#10024;</div>
  <div class="ty-title">Thank You!</div>
  <div class="ty-sub">
    Your order has been placed. PayPal will send a receipt to your email.<br>
    We'll ship your items within 3-7 business days.
  </div>
  <div class="ty-order" id="ty-order"></div>
  <a href="index.html" class="ty-btn">Continue Shopping</a>
  <div class="ty-footer">&copy; 2025 PhoenixDrop</div>
</div>

<script>
(function () {
  /* Show most recent order info */
  var orders = [];
  try { orders = JSON.parse(localStorage.getItem("pd_orders") || "[]"); } catch (e) {}
  var el = document.getElementById("ty-order");
  if (orders.length > 0) {
    var last = orders[orders.length - 1];
    el.innerHTML = "<strong>Order:</strong> " + (last.id || "N/A")
      + " &nbsp;|&nbsp; <strong>Total:</strong> $" + (parseFloat(last.total) || 0).toFixed(2)
      + " &nbsp;|&nbsp; <strong>Items:</strong> " + (last.items ? last.items.length : 0);
  } else {
    el.innerHTML = "Order details will appear in your PayPal receipt.";
  }
  /* Clear cart after successful purchase */
  localStorage.removeItem("pd_cart");
})();
</script>
</body>
</html>
